name: 🚀 Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'          # 推送 v1.2.0 格式标签自动触发
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名称（如 1.2.0）'
        required: true
        default: '1.0.0'
      version_code:
        description: '版本号（整数，如 10）'
        required: true
        default: '1'
      create_release:
        description: '是否创建 GitHub Release'
        type: boolean
        default: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 检出代码 ────────────────────────────────────────────────
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 解析版本号 ──────────────────────────────────────────────
      - name: 🔖 Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # 从 tag 中提取（v1.2.0 → 1.2.0）
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "VERSION_NAME=$TAG" >> "$GITHUB_OUTPUT"
            # version_code：去掉点后转整数（1.2.0 → 120）
            CODE=$(echo "$TAG" | tr -d '.' | sed 's/^0*//')
            echo "VERSION_CODE=${CODE:-1}" >> "$GITHUB_OUTPUT"
            echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION_NAME=${{ inputs.version_name }}" >> "$GITHUB_OUTPUT"
            echo "VERSION_CODE=${{ inputs.version_code }}" >> "$GITHUB_OUTPUT"
            echo "RELEASE_TAG=v${{ inputs.version_name }}"  >> "$GITHUB_OUTPUT"
          fi

      # ── Java 17 ─────────────────────────────────────────────────
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # ── Gradle 权限 ─────────────────────────────────────────────
      - name: 🔧 Grant execute permission
        run: chmod +x gradlew

      # ── 构建 Release APK ────────────────────────────────────────
      - name: 🔨 Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PVERSION_NAME="${{ steps.version.outputs.VERSION_NAME }}" \
            -PVERSION_CODE="${{ steps.version.outputs.VERSION_CODE }}" \
            --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      # ── APK 签名（可选，需配置 Secrets） ───────────────────────
      - name: 🔏 Sign APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias:            ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword:      ${{ secrets.KEY_PASSWORD }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # ── 重命名并归档 APK ────────────────────────────────────────
      - name: 📦 Rename APK
        run: |
          VERSION="${{ steps.version.outputs.VERSION_NAME }}"
          mkdir -p dist
          SIGNED=$(find app/build/outputs/apk/release -name "*-signed.apk" 2>/dev/null | head -1)
          if [ -n "$SIGNED" ]; then
            cp "$SIGNED" "dist/NotifyForward-v${VERSION}.apk"
          else
            UNSIGNED=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
            cp "$UNSIGNED" "dist/NotifyForward-v${VERSION}-unsigned.apk"
          fi
          echo "=== dist/ ===" && ls -lh dist/

      # ── 上传 Artifact ────────────────────────────────────────────
      - name: ⬆️ Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name:           NotifyForward-v${{ steps.version.outputs.VERSION_NAME }}
          path:           dist/*.apk
          retention-days: 30

      # ── 创建 GitHub Release ──────────────────────────────────────
      - name: 🎉 Create GitHub Release
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.RELEASE_TAG }}
          name:       "NotifyForward v${{ steps.version.outputs.VERSION_NAME }}"
          draft:      false
          prerelease: false
          files:      dist/*.apk
          body: |
            ## 📦 NotifyForward v${{ steps.version.outputs.VERSION_NAME }}

            ### 下载说明
            - **有签名版**（NotifyForward-vX.X.X.apk）：可直接安装
            - **无签名版**（*-unsigned.apk）：需手动签名后安装

            ### 安装要求
            - Android 8.0（API 26）及以上 / 鸿蒙 4.0+
            - 首次使用需授予「通知使用权限」

            ### 变更内容
            > 请查看 [CHANGELOG.md](https://github.com/xiaobaiweinuli/NotifyForward/blob/main/CHANGELOG.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
